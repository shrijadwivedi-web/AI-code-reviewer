services:
  - type: web
    name: ai-code-reviewer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: "https://your-vercel-app-url.vercel.app"
      # IMPORTANT: Set GEMINI_API_KEY and GITHUB_TOKEN in the Render dashboard manually!
